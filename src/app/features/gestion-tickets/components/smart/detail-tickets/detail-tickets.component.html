@if (configForm()) {
  <app-formulario-escritura
    [config]="configForm()"
    (formValueChange)="setValueForms($event)"
  ></app-formulario-escritura>
  <div class="flex items-center justify-between px-4 mt-6 border-t border-gray-100 pt-4">
    <button
      class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 transition-colors font-medium"
      (click)="volverListado()"
    >
      Volver al listado
    </button>

    <button
      class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed transition-all shadow-sm font-medium"
      [disabled]="!updatedTicket?.valid"
      (click)="guardarCambios()"
    >
      Guardar Cambios
    </button>
  </div>
} @else {
  <div>
    <h2>No se ha podido cargar la configuracion</h2>
  </div>
}
